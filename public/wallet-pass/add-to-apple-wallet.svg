<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 50" role="img" aria-label="Add to Apple Wallet">
  <title>Add to Apple Wallet</title>
  <rect width="165" height="50" rx="8" ry="8" fill="#000"/>
  <!-- Apple Wallet glyph: stylized card stack -->
  <g transform="translate(13,15)" fill="#fff">
    <rect x="0" y="3" width="20" height="14" rx="2.5" ry="2.5" opacity="0.5"/>
    <rect x="2" y="0" width="20" height="14" rx="2.5" ry="2.5"/>
    <path d="M2 4 h20" stroke="#000" stroke-width="0.7" opacity="0.25"/>
  </g>
  <!-- Add to Apple Wallet text -->
  <text x="44" y="20" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="500" fill="#fff" letter-spacing="0.2">Add to</text>
  <text x="44" y="36" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="600" fill="#fff" letter-spacing="-0.1">Apple Wallet</text>
</svg>
